<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calorie Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🍎 Daily Calorie Tracker</h1>

    <div class="input-box">
      <input type="text" id="foodName" placeholder="Enter food name">
      <input type="number" id="quantity" placeholder="Quantity (grams)">
      <button onclick="addFood()">Add Food</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Food</th>
          <th>Quantity (g)</th>
          <th>Calories</th>
          <th>Protein (g)</th>
        </tr>
      </thead>
      <tbody id="foodList"></tbody>
    </table>

    <div class="total">
      <h2>Total Calories: <span id="totalCalories">0</span> kcal</h2>
      <h2>Total Protein: <span id="totalProtein">0</span> g</h2>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
